<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari spricht mit dir – telequest</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<meta name="description" content="Mari, dein persönlicher KI-Assistent, geht direkt ran und richtet dich in 2 Minuten ein.">
<style>
  :root{--brand:#2f7bf0;--brand-deep:#1f5fd0;--teal:#5ef0d0;--line:rgba(130,160,210,.18)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;color:#eaeff8;min-height:100vh;
    background:radial-gradient(130% 100% at 50% -8%,#212b41,#0b0f1a 60%);display:flex;flex-direction:column;align-items:center;
    padding:26px 18px 40px}
  body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(120,150,200,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(120,150,200,.06) 1px,transparent 1px);background-size:42px 42px}
  .wrap{position:relative;z-index:1;width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center}

  /* Brand */
  .brand{position:relative;display:flex;flex-direction:column;align-items:center;max-width:280px;width:100%;margin-bottom:8px}
  .brand:before{content:"";position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:150%;height:180%;
    background:radial-gradient(58% 52% at 50% 42%,#0d1320 0%,rgba(13,19,32,.7) 46%,transparent 74%);pointer-events:none}
  .b-wm{width:100%;max-width:240px;display:block;position:relative;z-index:2}
  .chrome{background:linear-gradient(180deg,#f2f6fc 0%,#9fb2ca 14%,#ffffff 33%,#b4c1d3 47%,#6b7b93 50%,#26324c 51.5%,#1c2740 53%,#6a7c98 64%,#ccd8e6 83%,#eef3fb 100%);background-size:100% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;animation:mshine 6s ease-in-out infinite alternate}
  @keyframes mshine{0%{background-position:50% 0%}100%{background-position:50% 100%}}
  .ai{color:#1ecb7b;text-shadow:0 0 12px rgba(30,203,123,.5)}
  .flag{width:14px;height:10px;border-radius:2px;display:inline-block;box-shadow:0 0 0 1px rgba(255,255,255,.2);background:linear-gradient(#ed2939 0 33.33%,#fff 33.33% 66.66%,#ed2939 66.66% 100%)}
  .mari-wm-top{font-weight:800;font-size:44px;line-height:1;letter-spacing:.5px;display:flex;justify-content:center}
  .mari-desc-top{font-size:10px;font-weight:600;letter-spacing:4px;color:#1ecb7b;margin-top:5px;text-align:center}
  .mari-by-top{font-size:11px;font-weight:700;margin-top:5px;display:flex;align-items:center;justify-content:center;gap:4px}
  .mari-by-top .tm{font-size:8px;color:#8b97ad;align-self:flex-start;margin-top:1px}
  .mari-by-top .sep{color:#5f6c82;font-weight:500}

  /* Mari Orb + Wave */
  .orb{position:relative;width:150px;height:150px;border-radius:50%;margin:18px 0 6px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 40% 35%,#2f7bf0,#123b86 70%);box-shadow:0 0 0 1px var(--line),0 18px 50px -14px rgba(47,123,240,.6);
    transition:transform .3s}
  .orb.speaking{animation:breathe 1.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .orb .ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(94,240,208,.35);opacity:0}
  .orb.listening .ring{animation:ping 1.4s ease-out infinite}
  @keyframes ping{0%{transform:scale(.9);opacity:.6}100%{transform:scale(1.25);opacity:0}}
  .wave{display:flex;align-items:center;gap:3px;height:44px}
  .wave i{width:4px;border-radius:3px;background:linear-gradient(to top,#2f7bf0,#5ef0d0);transform-origin:center;height:8px}
  .orb.speaking .wave i{animation:eq .6s ease-in-out infinite}
  .orb.listening .wave i{background:linear-gradient(to top,#12a56a,#5ef0d0)}
  .wave i:nth-child(2){animation-delay:.1s}.wave i:nth-child(3){animation-delay:.2s}
  .wave i:nth-child(4){animation-delay:.3s}.wave i:nth-child(5){animation-delay:.15s}
  .wave i:nth-child(6){animation-delay:.25s}.wave i:nth-child(7){animation-delay:.05s}
  @keyframes eq{0%,100%{height:8px}50%{height:34px}}
  .status{font-size:12px;letter-spacing:3px;color:#8b97ad;margin-top:2px;min-height:16px;text-transform:uppercase}

  /* Speech bubble */
  .say{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:16px 0 6px;
    font-size:17px;line-height:1.5;text-align:center;min-height:56px;width:100%}
  .heard{font-size:13px;color:#8b97ad;min-height:18px;text-align:center;margin-bottom:6px}

  /* Controls */
  .ctrls{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .btn{border:none;cursor:pointer;font-weight:700;font-size:16px;color:#fff;background:var(--brand);padding:15px;border-radius:13px;
    display:flex;align-items:center;justify-content:center;gap:9px;transition:.15s}
  .btn:hover{background:var(--brand-deep)}
  .btn.ghost{background:rgba(255,255,255,.08);border:1px solid var(--line)}
  .btn.ghost:hover{background:rgba(255,255,255,.14)}
  .btn[disabled]{opacity:.55;cursor:default}
  .fld{width:100%;border:1.5px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:12px;padding:15px 16px;font-size:17px;outline:none}
  .fld:focus{border-color:var(--brand)}
  .fld::placeholder{color:#7f8aa0}
  .voices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .voice{border:2px solid var(--line);border-radius:13px;padding:12px;cursor:pointer;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);transition:.15s}
  .voice.sel{border-color:var(--teal);background:rgba(94,240,208,.1)}
  .voice .av{width:34px;height:34px;border-radius:50%;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px}
  .voice b{font-size:14px;display:block}.voice span{font-size:11px;color:#8b97ad}
  .mute{position:absolute;top:0;right:0;background:none;border:1px solid var(--line);color:#8b97ad;border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer}
  .fwd{background:rgba(255,255,255,.06);border:1px dashed var(--teal);border-radius:14px;padding:16px;text-align:center;width:100%}
  .fwd span{font-size:12px;color:#8b97ad;display:block;margin-bottom:4px}.fwd b{font-size:24px;letter-spacing:1px;color:#bfeee0}
  .hint{font-size:12px;color:#8b97ad;text-align:center;margin-top:2px}
</style>
</head>
<body>
  <div class="wrap">
    <button class="mute" id="mute" onclick="toggleMute()" style="position:fixed;top:16px;right:16px;z-index:5">🔊 Ton an</button>

    <div class="brand">
      <div class="mari-wm-top"><span class="chrome">M</span><span class="ai">a</span><span class="chrome">r</span><span class="ai">i</span></div>
      <div class="mari-desc-top">DEIN TELEFON-ASSISTENT</div>
      <div class="mari-by-top"><span class="chrome">by telequest</span><span class="tm">®</span><span class="sep">·</span><span class="chrome">seit 2001</span><span class="flag"></span></div>
    </div>

    <div class="orb" id="orb">
      <div class="ring"></div>
      <div class="wave"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    </div>
    <div class="status" id="status">Mari</div>

    <div class="say" id="say">Hallo! Ich bin Mari, dein persönlicher KI-Assistent von telequest.</div>
    <div class="heard" id="heard"></div>

    <div class="ctrls" id="ctrls"></div>
  </div>

<script>
const VOICES=[
  {n:"Mari",d:"warm & freundlich",c:"linear-gradient(135deg,#3b3ff0,#8b5cf6)",i:"M"},
  {n:"Lena",d:"ruhig & klar",c:"linear-gradient(135deg,#0ea5e9,#22d3ee)",i:"L"},
  {n:"Ben",d:"sachlich & direkt",c:"linear-gradient(135deg,#12a56a,#4ade80)",i:"B"},
  {n:"Jonas",d:"locker & nahbar",c:"linear-gradient(135deg,#ff7a4d,#fbbf24)",i:"J"}
];
const state={branche:"",phone:"",voice:0,muted:false};
const orb=document.getElementById('orb'), statusEl=document.getElementById('status');
const sayEl=document.getElementById('say'), heardEl=document.getElementById('heard'), ctrls=document.getElementById('ctrls');

// ---- Sprachausgabe (SpeechSynthesis) ----
let deVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices(); deVoice=vs.find(v=>/de(-|_)/i.test(v.lang))||vs[0]||null; }
if('speechSynthesis'in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text, done){
  sayEl.textContent=text;
  if(state.muted || !('speechSynthesis'in window)){ setTalking(false); if(done)setTimeout(done,700); return; }
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.lang='de-DE'; if(deVoice)u.voice=deVoice; u.rate=1.02; u.pitch=1.05;
    setTalking(true);
    u.onend=()=>{ setTalking(false); if(done)done(); };
    u.onerror=()=>{ setTalking(false); if(done)done(); };
    speechSynthesis.speak(u);
  }catch(e){ setTalking(false); if(done)done(); }
}
function setTalking(on){ orb.classList.toggle('speaking',on); statusEl.textContent=on?'spricht …':'Mari'; }
function toggleMute(){ state.muted=!state.muted; document.getElementById('mute').textContent=state.muted?'🔇 Ton aus':'🔊 Ton an';
  if(state.muted && 'speechSynthesis'in window) speechSynthesis.cancel(); }

// ---- Spracherkennung (optional) ----
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function listen(onText){
  if(!SR){ heardEl.textContent='(Spracherkennung hier nicht verfügbar – tipp einfach unten)'; return false; }
  const r=new SR(); r.lang='de-DE'; r.interimResults=true; r.maxAlternatives=1;
  orb.classList.add('listening'); statusEl.textContent='hört zu …';
  let finalText='';
  r.onresult=e=>{ let t=''; for(const res of e.results) t+=res[0].transcript; heardEl.textContent='„'+t+'"';
    if(e.results[e.results.length-1].isFinal) finalText=t; };
  r.onerror=()=>{ orb.classList.remove('listening'); statusEl.textContent='Mari'; };
  r.onend=()=>{ orb.classList.remove('listening'); statusEl.textContent='Mari'; if(finalText) onText(finalText.trim()); };
  try{ r.start(); }catch(e){}
  return true;
}

// ---- Helpers ----
function setCtrls(html){ ctrls.innerHTML=html; }
function btn(label,onclick,cls){ const b=document.createElement('button'); b.className='btn '+(cls||''); b.innerHTML=label; b.onclick=onclick; return b; }

// ---- Gesprächsablauf ----
function start(){
  setCtrls('');
  speak('Hallo! Ich bin Mari, dein persönlicher KI-Assistent von telequest. In zwei Minuten zeige ich dir, wie bei dir kein Anruf mehr verloren geht.', askBranche);
}
function askBranche(){
  speak('Sag mir kurz: was machst du beruflich?', ()=>{
    const ok=listen(t=>{ state.branche=t; pitch(); });
    ctrls.innerHTML='';
    const inp=document.createElement('input'); inp.className='fld'; inp.placeholder='z. B. Handwerker, Praxis, Kanzlei …';
    const go=btn('Weiter <span aria-hidden="true">→</span>',()=>{ if(inp.value.trim()){state.branche=inp.value.trim();} pitch(); });
    ctrls.appendChild(inp); ctrls.appendChild(go);
    if(!ok) inp.focus();
  });
}
function pitch(){
  if('speechSynthesis'in window) try{speechSynthesis.cancel()}catch(e){}
  orb.classList.remove('listening'); heardEl.textContent='';
  const b=state.branche? state.branche : 'dein Betrieb';
  setCtrls('');
  speak('Verstehe. Stell dir vor, du bist gerade beschäftigt und das Telefon klingelt — ich gehe für dich ran, nehme das Anliegen strukturiert auf und schicke dir sofort die Zusammenfassung. Kein verpasster Auftrag mehr.', askNumber);
}
function askNumber(){
  speak('Auf welche Nummer sollen wir Anrufe leiten, wenn du nicht rangehst? Tipp sie einfach ein.', ()=>{
    const inp=document.createElement('input'); inp.className='fld'; inp.type='tel'; inp.inputMode='tel'; inp.placeholder='z. B. 0664 1234567';
    const go=btn('Weiter <span aria-hidden="true">→</span>',()=>{ if(inp.value.trim().length<4){inp.style.borderColor='#e24b4a';return;} state.phone=inp.value.trim(); askVoice(); });
    setCtrls(''); ctrls.appendChild(inp); ctrls.appendChild(go); inp.focus();
  });
}
function askVoice(){
  speak('Und wie soll ich klingen? Tipp eine Stimme an.', ()=>{
    setCtrls('');
    const grid=document.createElement('div'); grid.className='voices';
    VOICES.forEach((v,i)=>{ const el=document.createElement('div'); el.className='voice'+(i===state.voice?' sel':'');
      el.innerHTML=`<div class="av" style="background:${v.c}">${v.i}</div><div><b>${v.n}</b><span>${v.d}</span></div>`;
      el.onclick=()=>{ state.voice=i; document.querySelectorAll('.voice').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); };
      grid.appendChild(el); });
    ctrls.appendChild(grid);
    ctrls.appendChild(btn('Weiter <span aria-hidden="true">→</span>', confirm));
  });
}
function confirm(){
  speak('Perfekt. Die erste Woche ist gratis, danach neun Euro fünfundneunzig pro Woche — jederzeit kündbar. Soll ich dich jetzt einrichten?', ()=>{
    setCtrls('');
    ctrls.appendChild(btn('Ja, richte mich ein <span aria-hidden="true">→</span>', close));
    ctrls.appendChild(btn('Ich überlege noch', ()=>{ speak('Kein Problem. Wenn du so weit bist, bin ich sofort für dich da.', ()=>{}); }, 'ghost'));
  });
}
async function close(){
  setCtrls(''); statusEl.textContent='richte ein …';
  speak('Super. Ich richte dich jetzt ein und schicke dir gleich per SMS deine Einwahlnummer.');
  try{
    const res=await fetch('/api/create-checkout-session',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({plan:'basis',trial:true,phone:state.phone,voice:VOICES[state.voice].n})});
    if(!res.ok) throw new Error();
    const data=await res.json(); if(data.url){ window.location=data.url; return; }
    throw new Error();
  }catch(e){ success(); }
}
function success(){
  const name=VOICES[state.voice].n;
  speak('Fertig! Ab jetzt geht kein Anruf mehr verloren. Leite deine Nummer einfach auf die Einwahl um, die ich dir per SMS geschickt habe.');
  sayEl.textContent='Fertig! Ab jetzt bleibt kein Anruf mehr liegen.';
  setCtrls('');
  const fwd=document.createElement('div'); fwd.className='fwd';
  fwd.innerHTML='<span>Deine Einwahl (auch per SMS)</span><b>0720 40 50 60</b>';
  ctrls.appendChild(fwd);
  ctrls.appendChild(btn('Mehr über Mari erfahren', ()=>location.href='index.html','ghost'));
  const h=document.createElement('p'); h.className='hint'; h.textContent='Demo – sobald Stripe verbunden ist, läuft hier die echte Zahlung + SMS.';
  ctrls.appendChild(h);
}

// Start-Button (Nutzergeste nötig für Audio + Mikrofon)
setCtrls('');
ctrls.appendChild(btn('▶  Gespräch mit Mari starten', start));
const h=document.createElement('p'); h.className='hint'; h.textContent='Mari spricht mit dir. Am besten mit Ton – Kopfhörer empfohlen.';
ctrls.appendChild(h);
</script>
</body>
</html>
