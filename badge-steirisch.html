<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari – Steirisch-Badge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0b0f1a;display:flex;align-items:center;justify-content:center;
    font-family:'Poppins',-apple-system,"Segoe UI",Arial,sans-serif}
  /* Wiederverwendbares Badge – überall einsetzbar */
  .steirisch{display:inline-flex;align-items:center;gap:9px;background:rgba(30,203,123,.12);
    border:1px solid rgba(30,203,123,.45);border-radius:30px;padding:9px 16px 9px 12px;color:#7ff0c4;
    font-size:14px;font-weight:500}
  .steirisch .ic{width:26px;height:26px;border-radius:50%;background:#1ecb7b;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .steirisch b{color:#a9f5d6;font-weight:700}
  .flag{width:16px;height:11px;border-radius:2px;margin-left:2px;box-shadow:0 0 0 1px rgba(255,255,255,.2);
    background:linear-gradient(#ed2939 0 33.33%,#fff 33.33% 66.66%,#ed2939 66.66% 100%)}
</style>
</head>
<body>
  <div class="steirisch">
    <span class="ic">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#0b3d29" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </span>
    Vasteht di. <b>Sogoa auf Steirisch.</b>
    <span class="flag"></span>
  </div>
</body>
</html>
