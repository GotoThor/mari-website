<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari – Dein Telefon-Assistent | telequest (Steirisch)</title>
<meta name="description" content="Mari hebt o, wånnst du net kaunst. Der Telefon-Assistent von telequest – seit 2001. Vasteht di, sogoa auf Steirisch.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0b0f1a;overflow:hidden;font-family:'Poppins',-apple-system,"Segoe UI",Arial,sans-serif}
  .ad{position:relative;width:100%;height:100vh;min-height:220px;overflow:hidden;isolation:isolate}
  .bg-dark,.bg-light{position:absolute;inset:0}
  .bg-dark{background:radial-gradient(120% 130% at 50% 0%,#20293e,#0b0f1a 70%);animation:adDark 12s ease-in-out infinite}
  .bg-light{background:radial-gradient(120% 130% at 50% 0%,#eef3fb,#c9d6ea 75%);opacity:0;animation:adLight 12s ease-in-out infinite}
  .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(120,150,200,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(120,150,200,.1) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 9s linear infinite;mix-blend-mode:overlay}
  .sheen{position:absolute;top:-40%;left:-30%;width:36%;height:180%;transform:rotate(18deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);filter:blur(6px);animation:sheen 6.5s ease-in-out infinite}
  .spot{position:absolute;inset:0;background:radial-gradient(closest-side at 50% 52%,rgba(6,10,18,.5),transparent 72%)}
  .center{position:relative;z-index:5;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center}
  .lockup{display:flex;align-items:center;gap:22px}
  .orb-wrap{position:relative;width:96px;height:96px;flex-shrink:0}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(30,203,123,.5);animation:ping 3s ease-out infinite}
  .ring.r2{animation-delay:1.5s}
  @keyframes ping{0%{transform:scale(.82);opacity:.5}80%,100%{transform:scale(1.35);opacity:0}}
  .orb{position:absolute;inset:11px;border-radius:50%;overflow:hidden;background:linear-gradient(150deg,#f4f7fb 0%,#aab2c2 18%,#ffffff 34%,#8790a2 50%,#454c5c 52%,#7a8496 66%,#cfd5df 84%,#eef2f7 100%);background-size:220% 220%;animation:orbshine 6.5s ease-in-out infinite alternate;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px -8px rgba(0,0,0,.55),inset 0 2px 5px rgba(255,255,255,.6),inset 0 -6px 12px rgba(0,0,0,.28)}
  @keyframes orbshine{0%{background-position:0% 0%}100%{background-position:100% 100%}}
  .orb::before{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 34% 28%,rgba(255,255,255,.55),transparent 46%)}
  .vwave{display:flex;align-items:center;gap:2.5px;height:30px;position:relative;z-index:2}
  .vwave i{width:3.5px;border-radius:3px;background:#1ecb7b;box-shadow:0 0 5px rgba(30,203,123,.7);transform-origin:center;height:6px;animation:eq .9s ease-in-out infinite}
  .vwave i:nth-child(2){animation-delay:.15s}.vwave i:nth-child(3){animation-delay:.3s}.vwave i:nth-child(4){animation-delay:.2s}.vwave i:nth-child(5){animation-delay:.1s}
  @keyframes eq{0%,100%{height:6px}50%{height:22px}}
  .badge{position:absolute;right:0;bottom:0;width:30px;height:30px;border-radius:50%;background:#1ecb7b;display:flex;align-items:center;justify-content:center;border:3px solid #0c111b;box-shadow:0 4px 12px -2px rgba(30,203,123,.8);animation:beat 2.4s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .txt{display:flex;flex-direction:column;align-items:flex-start}
  .wm{font-weight:800;font-size:54px;line-height:1;letter-spacing:.5px;display:flex}
  .chrome{background:linear-gradient(180deg,#f2f6fc 0%,#9fb2ca 14%,#ffffff 33%,#b4c1d3 47%,#6b7b93 50%,#26324c 51.5%,#1c2740 53%,#6a7c98 64%,#ccd8e6 83%,#eef3fb 100%);background-size:100% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;animation:shine 6s ease-in-out infinite alternate}
  .rosso{background:linear-gradient(180deg,#ff5a46 0%,#c21206 14%,#ff3322 32%,#9c0d02 47%,#520702 50%,#200402 51.5%,#120101 53%,#720a02 64%,#cc1408 83%,#ff4d3a 100%);background-size:100% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;animation:shine 6s ease-in-out infinite alternate;filter:drop-shadow(0 0 12px rgba(212,0,0,.4))}
  @keyframes shine{0%{background-position:50% 0%}100%{background-position:50% 100%}}
  .ai{color:#1ecb7b;text-shadow:0 0 12px rgba(30,203,123,.55)}
  .tag{font-size:18px;font-weight:700;margin-top:6px}
  .gdesc{font-size:10.5px;font-weight:600;letter-spacing:4px;color:#1ecb7b;margin-top:6px}
  .by{font-size:12px;font-weight:700;margin-top:6px;display:flex;align-items:center;gap:4px}
  .tm{font-size:8px;color:#8b97ad;align-self:flex-start;margin-top:1px}
  .sep{color:#5f6c82;font-weight:500}
  .flag{width:15px;height:10px;border-radius:2px;margin-left:2px;box-shadow:0 0 0 1px rgba(255,255,255,.2);background:linear-gradient(#ed2939 0 33.33%,#fff 33.33% 66.66%,#ed2939 66.66% 100%)}
  .cta{margin-top:22px;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;color:#fff;text-decoration:none;background:#1ecb7b;padding:13px 28px;border-radius:30px;box-shadow:0 8px 22px -6px rgba(30,203,123,.7);transition:transform .15s;display:inline-block}
  .cta:hover{transform:translateY(-2px)}
  .steirisch{margin-top:14px;display:inline-flex;align-items:center;gap:7px;background:rgba(30,203,123,.12);border:1px solid rgba(30,203,123,.4);border-radius:30px;padding:6px 13px;color:#7ff0c4;font-size:12px;font-weight:500}
  .steirisch b{color:#a9f5d6;font-weight:700}
  @keyframes adDark{0%,42%{opacity:1}52%,92%{opacity:0}100%{opacity:1}}
  @keyframes adLight{0%,42%{opacity:0}52%,92%{opacity:1}100%{opacity:0}}
  @keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
  @keyframes sheen{0%{left:-30%}55%,100%{left:130%}}
  @media(max-width:560px){.lockup{flex-direction:column;gap:12px}.txt{align-items:center}.wm{font-size:46px}}
</style>
</head>

  <div class="ad">
    <div class="bg-dark"></div><div class="bg-light"></div>

      </div>
