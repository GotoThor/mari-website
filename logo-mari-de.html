<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari – Dein Telefon-Assistent | Logo (DE)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#070a12;display:flex;align-items:center;justify-content:center;
    font-family:'Poppins',-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
  .ml{background:radial-gradient(120% 110% at 50% 8%,#1c2436,#0b0f1a 70%);border-radius:22px;padding:40px 50px;
    display:flex;align-items:center;gap:32px;box-shadow:0 30px 80px -30px rgba(0,0,0,.7)}
  .orb-wrap{position:relative;width:130px;height:130px;flex-shrink:0}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(30,203,123,.5);animation:ping 3s ease-out infinite}
  .ring.r2{animation-delay:1.5s}
  @keyframes ping{0%{transform:scale(.82);opacity:.5}80%,100%{transform:scale(1.35);opacity:0}}
  .orb{position:absolute;inset:15px;border-radius:50%;overflow:hidden;
    background:linear-gradient(150deg,#f4f7fb 0%,#aab2c2 18%,#ffffff 34%,#8790a2 50%,#454c5c 52%,#7a8496 66%,#cfd5df 84%,#eef2f7 100%);
    background-size:220% 220%;animation:orbshine 6.5s ease-in-out infinite alternate;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 14px 32px -8px rgba(0,0,0,.55),inset 0 2px 6px rgba(255,255,255,.6),inset 0 -7px 14px rgba(0,0,0,.28)}
  @keyframes orbshine{0%{background-position:0% 0%}100%{background-position:100% 100%}}
  .orb::before{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle at 34% 28%,rgba(255,255,255,.55),transparent 46%)}
  .vwave{display:flex;align-items:center;gap:3px;height:42px;position:relative;z-index:2}
  .vwave i{width:4px;border-radius:3px;background:#1ecb7b;box-shadow:0 0 6px rgba(30,203,123,.7);transform-origin:center;height:8px;animation:eq .9s ease-in-out infinite}
  .vwave i:nth-child(2){animation-delay:.15s}.vwave i:nth-child(3){animation-delay:.3s}
  .vwave i:nth-child(4){animation-delay:.2s}.vwave i:nth-child(5){animation-delay:.1s}
  @keyframes eq{0%,100%{height:8px}50%{height:30px}}
  .badge{position:absolute;right:2px;bottom:2px;width:38px;height:38px;border-radius:50%;background:#1ecb7b;
    display:flex;align-items:center;justify-content:center;border:3px solid #0c111b;box-shadow:0 4px 14px -2px rgba(30,203,123,.8);animation:beat 2.4s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .txt{display:flex;flex-direction:column}
  .wm{font-weight:800;font-size:70px;line-height:1;letter-spacing:.5px;display:flex}
  .chrome{background:linear-gradient(180deg,#f2f6fc 0%,#9fb2ca 14%,#ffffff 33%,#b4c1d3 47%,#6b7b93 50%,#26324c 51.5%,#1c2740 53%,#6a7c98 64%,#ccd8e6 83%,#eef3fb 100%);
    background-size:100% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
    animation:shine 6s ease-in-out infinite alternate}
  .rosso{background:linear-gradient(180deg,#ff5a46 0%,#c21206 14%,#ff3322 32%,#9c0d02 47%,#520702 50%,#200402 51.5%,#120101 53%,#720a02 64%,#cc1408 83%,#ff4d3a 100%);
    background-size:100% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
    animation:shine 6s ease-in-out infinite alternate;filter:drop-shadow(0 0 14px rgba(212,0,0,.4))}
  @keyframes shine{0%{background-position:50% 0%}100%{background-position:50% 100%}}
  .ai{color:#1ecb7b;text-shadow:0 0 12px rgba(30,203,123,.55)}
  .tag{font-size:21px;font-weight:700;margin-top:9px}
  .desc{font-size:12px;font-weight:600;letter-spacing:4px;color:#1ecb7b;margin-top:8px}
  .by{font-size:13.5px;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:5px}
  .tm{font-size:9px;color:#8b97ad;align-self:flex-start;margin-top:2px}
  .sep{color:#5f6c82;font-weight:500}
  .flag{width:18px;height:12px;border-radius:2px;flex-shrink:0;margin-left:3px;box-shadow:0 0 0 1px rgba(255,255,255,.2);
    background:linear-gradient(#ed2939 0 33.33%,#fff 33.33% 66.66%,#ed2939 66.66% 100%)}
  @media(max-width:560px){.ml{flex-direction:column;text-align:center}.txt{align-items:center}.by{justify-content:center}}
</style>
</head>
<body>
  <div class="ml">
    <div class="orb-wrap">
      <span class="ring"></span><span class="ring r2"></span>
      <div class="orb"><div class="vwave"><i></i><i></i><i></i><i></i><i></i></div></div>
      <div class="badge" aria-label="nimmt Anrufe an">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.3 21 3 13.7 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1L6.6 10.8z"/></svg>
      </div>
    </div>
    <div class="txt">
      <div class="wm"><span class="chrome">M</span><span class="ai">a</span><span class="chrome">r</span><span class="ai">i</span></div>
      <div class="tag rosso">Geht ran, wenn du nicht kannst.</div>
      <div class="desc">DEIN TELEFON-ASSISTENT</div>
      <div class="by"><span class="chrome">by telequest</span><span class="tm">&reg;</span><span class="sep">·</span><span class="chrome">seit 2001</span><span class="flag"></span></div>
    </div>
  </div>
</body>
</html>
